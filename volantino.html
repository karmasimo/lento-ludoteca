<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Volantino Instagram Bar Lento</title>
  <!-- Google Fonts: Outfit (title) and Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #fcfbf7;
      --color-accent: #e05a47; /* Terracotta */
      --color-accent-dark: #b84130;
      --color-text-dark: #1e293b;
      --color-text-muted: #64748b;
      --color-card-bg: #ffffff;
      --color-border: #f1ede4;
      --font-title: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f0eee8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* Instagram 1:1 post container */
    .instagram-post {
      width: 1080px;
      height: 1080px;
      background-color: var(--color-bg);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 75px;
      box-shadow: 0 30px 60px rgba(30, 41, 59, 0.15);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    /* Background organic gradient glow & elements */
    .bg-glow {
      position: absolute;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(224, 90, 71, 0.08) 0%, rgba(224, 90, 71, 0) 70%);
      pointer-events: none;
      z-index: 1;
    }

    .bg-glow-2 {
      position: absolute;
      bottom: -300px;
      left: -200px;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(224, 90, 71, 0.05) 0%, rgba(224, 90, 71, 0) 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* Floating Game Elements (Decorative) */
    .floating-shape {
      position: absolute;
      color: rgba(224, 90, 71, 0.08);
      fill: currentColor;
      pointer-events: none;
      z-index: 1;
    }

    .meeple-1 {
      top: 15%;
      right: 10%;
      width: 130px;
      height: 130px;
      transform: rotate(15deg);
    }

    .meeple-2 {
      bottom: 22%;
      left: 6%;
      width: 90px;
      height: 90px;
      transform: rotate(-25deg);
      opacity: 0.7;
    }

    .dice-1 {
      top: 48%;
      right: 5%;
      width: 110px;
      height: 110px;
      transform: rotate(-10deg);
    }

    .cards-1 {
      bottom: 40%;
      left: 4%;
      width: 100px;
      height: 100px;
      transform: rotate(20deg);
    }

    /* Content wrapper */
    .content {
      z-index: 2;
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Top: Presenters / Badge */
    .header-badge {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .badge-text {
      background-color: var(--color-accent-light);
      color: var(--color-accent);
      border: 1.5px solid rgba(224, 90, 71, 0.15);
      background-color: rgba(224, 90, 71, 0.04);
      font-family: var(--font-title);
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0.18em;
      padding: 10px 24px;
      border-radius: 100px;
      text-transform: uppercase;
    }

    /* Center: Main Branding & Info Card */
    .main-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 36px;
      padding: 55px 45px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(30, 41, 59, 0.03);
      margin: auto 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .logo-container {
      width: 280px;
      color: var(--color-text-dark);
      margin-bottom: 5px;
    }

    .logo-container svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .divider {
      width: 80px;
      height: 4px;
      background-color: var(--color-accent);
      border-radius: 2px;
    }

    .flyer-title {
      font-family: var(--font-title);
      font-size: 64px;
      font-weight: 900;
      color: var(--color-text-dark);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .flyer-title span {
      color: var(--color-accent);
    }

    /* Highlight Banner for "Ogni Giovedì Sera" */
    .schedule-banner {
      background-color: var(--color-accent);
      color: var(--color-bg);
      font-family: var(--font-title);
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -0.01em;
      padding: 16px 42px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(224, 90, 71, 0.25);
      display: inline-block;
      margin-top: 5px;
    }

    .flyer-subtitle {
      font-size: 26px;
      color: var(--color-text-muted);
      font-weight: 500;
      line-height: 1.4;
      max-width: 700px;
    }

    .flyer-subtitle strong {
      color: var(--color-text-dark);
    }

    /* Footer: CTA & Website */
    .footer-cta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .cta-label {
      font-size: 19px;
      color: var(--color-text-muted);
      letter-spacing: 0.05em;
      font-weight: 600;
      text-transform: uppercase;
    }

    .cta-button {
      background-color: var(--color-text-dark);
      color: var(--color-bg);
      font-family: var(--font-title);
      font-size: 28px;
      font-weight: 700;
      padding: 18px 45px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 20px rgba(30, 41, 59, 0.1);
    }

    .cta-button svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
    }
  </style>
</head>
<body>

  <div class="instagram-post">
    <!-- Background glows -->
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <!-- Floating vector graphics -->

      <polygon points="10,30 90,30" />

      <line x1="50" y1="38" x2="90" y2="30" />
      <line x1="50" y1="38" x2="50" y2="5" />

      <line x1="50" y1="62" x2="50" y2="95" />
      <polygon points="50,38 10,70 50,62" />
      <polygon points="50,38 90,70 50,62" />
    </svg>
    <!-- Cards Icon -->
    <svg class="floating-shape cards-1" viewBox="0 0 100 100">
      <!-- Card back -->
      <rect x="25" y="15" width="45" height="65" rx="6" transform="rotate(-10 47.5 47.5)" fill="none" stroke="currentColor" stroke-width="3" />

      <rect x="35" y="20" width="45" height="65" rx="6" transform="rotate(5 57.5 52.5)" fill="var(--color-bg)" stroke="currentColor" stroke-width="3" />
      <!-- Small details on front card -->
      <circle cx="58" cy="53" r="8" fill="currentColor" opacity="0.35" transform="rotate(5 57.5 52.5)" />
    </svg>

      <!-- Top Badge -->
      <div class="header-badge">
        <span class="badge-text">Delirimedia & Altroego presentano</span>
      </div>

        <div class="divider"></div>

        <h1 class="flyer-title">Lento<br><span>Game Night</span></h1>

        <div class="schedule-banner">
          OGNI GIOVEDÌ SERA
        </div>

        <p class="flyer-subtitle">
          Vieni a scoprire una collezione unica di <strong>Giochi da Tavolo & Ruolo</strong>.<br>
          Prenota il tuo tavolo e scegli il tuo prossimo gioco!
        </p>
      </div>

      <!-- Footer CTA -->
      <div class="footer-cta">
        <span class="cta-label">Sfoglia il catalogo e prenota:</span>

            <circle cx="12" cy="12" r="10"></circle>

        </div>

  </div>

</body>
</html>
